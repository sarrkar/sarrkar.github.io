experiences:
    title: Experiences
    info:
      - role: Backend Developer
        time: 2023 - Present
        company: Tabdeal
        details: |
          I started the job here recently. The job requirements included a deep understanding of
          concurrency and database transactions. I've been tasked with developing a backend for
          a trading bot to be used in the cryptocurrency market. I've also been tasked with
          developing a customer relationship management system for the company. clean code and
          test-driven development are the main requirements of the job. high throughput and
          low latency are also important.
      - role: ML Researcher
        time: 2022 - 2023
        company: Sharif University of Technology Dr. Rohban's Lab
        details: |
          I worked on multiple projects in the field of machine learning and deep learning. The projects
          ranged from computer vision for histopathology images to adversarial attacks on deep learning
          models. I've also worked on a project in the field of natural language processing. I've
          experienced working with different approaches to adversarial attacks such as FGSM and PGD and 
          how to defend against them. Ive also worked on preprocessing histopathology images and
          extracting features from them and deploying deep learning models such as Convolutional Neural Networks
          and Vision Transformers.
      - role: Junior ML Engineer
        time: 2021 - 2022
        company: ToobaTech
        details: |
          I worked as a junior machine learning engineer in ToobaTech.
          The job requirements included a deep understanding of machine learning and deep learning with 
          a focus on big data and computer vision. I've experienced working with different machine learning
          frameworks such as PyTorch and Scikit-Learn I've also worked with different tools such as
          Apache Spark and MySQL.

